;===========================================================
; CustomSwatches Mod Configuration
; Place this in: FactoryGame/Saved/Config/WindowsNoEditor/
; or use the SML Config UI in-game
;===========================================================

[CustomSwatches]

; --- UNPAINTED MARKER SLOT ---
; Buildings with this swatch slot index are considered "targetable" 
; by Blueprint Mode painting.
; Default: 12 (our custom "Unpainted Marker" swatch from user_swatches.json)
; Set to -1 to disable Blueprint Mode targeting.
UnpaintedMarkerSlot=12

; --- CATEGORY -> SWATCH MAPPINGS ---
; Each building category can be auto-assigned a swatch slot.
; Slot 0-11: Game defaults (0=blue, 1=orange, 2=red, 3=green, 4=purple, 
;            5=white, 6=yellow, 7=black, 8=vehicle, 9=pipes, 10-11=extra)
; Slot 12+: Custom swatches (add more in user_swatches.json)
;
; Set to -1 to disable auto-assignment for a category.
;
; If a category is mapped, new buildings of that type get the swatch
; automatically (unless they were manually painted already).

; Power infrastructure (poles, towers, circuit bridges, power storage)
; Recommended: slot 0 (default blue) or a custom "power yellow" slot
CategoryMapping_Power=-1

; Power generation (coal, fuel, nuclear, geothermal generators)
CategoryMapping_PowerGen=-1

; Production (smelters, constructors, assemblers, manufacturers, etc.)
CategoryMapping_Production=-1

; Logistics (belts, pipes, splitters, mergers, sinks)
CategoryMapping_Logistics=-1

; Storage (containers, fluid buffers)
CategoryMapping_Storage=-1

; Transport (trains, vehicles, drone stations, hypertubes, jump pads)
CategoryMapping_Transport=-1

; Foundations (foundations, ramps)
CategoryMapping_Foundations=-1

; Architecture (walls, pillars, stairs, walkways, signs, lights)
CategoryMapping_Architecture=-1

; Miners / Extractors (resource miners, oil extractors, water extractors, fracking)
CategoryMapping_Miner=-1

; Defense (snow cannons etc.)
CategoryMapping_Defense=-1

; Custom categories (for user-defined rules)
CategoryMapping_Custom00=-1
CategoryMapping_Custom01=-1
CategoryMapping_Custom02=-1
CategoryMapping_Custom03=-1

; --- DEFAULT PAINT MODE ---
; 0 = Default (single building)
; 1 = Blueprint All (entire blueprint group)
; 2 = Blueprint Mode (unpainted-only)
; 3 = Category Select (filtered by category)
DefaultPaintMode=0